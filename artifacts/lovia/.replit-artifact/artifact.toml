kind = "mobile"
previewPath = "/lovia/"
title = "Lovia"
version = "1.0.0"
id = "artifacts/lovia"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/lovia/" ]
localPort = 23473

[services.development]
run = "pnpm --filter @workspace/lovia run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lovia", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/lovia", "run", "serve" ]

[services.env]
PORT = "23473"
BASE_PATH = "/lovia/"
